[package]
name = "alloc"
version = "builtin"
kind = "library"

[dependencies]
core = "builtin"

[target]
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
