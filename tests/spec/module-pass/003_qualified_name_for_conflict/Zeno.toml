# category: module-pass
# purpose: module-qualified names disambiguate same-package declarations with the same simple name

[package]
name = "app"
entry = "main.main"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
