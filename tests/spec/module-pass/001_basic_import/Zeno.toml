# category: module-pass
# stage: mvp
# milestone: M2
# purpose: same-package declarations are directly visible without imports

[package]
name = "app"
entry = "main.main"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
