# stage: mvp
# milestone: M2
# purpose: library packages do not have application entry points

[package]
name = "entryLibrary"
kind = "library"
entry = "main.main" # expected-error[E1003]: library packages cannot declare package.entry

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
