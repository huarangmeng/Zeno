# category: manifest-fail
# stage: mvp
# milestone: M2
# purpose: kernel profile must require a trust report

[package]
name = "kernel_without_trust_report"
version = "0.1.0"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "kernel"

[allocator]
default = false

[panic]
strategy = "handler"
handler = "kernel.panicHandler"
stack = "addresses"

[oom]
strategy = "handler"
handler = "kernel.oomHandler"

[trust]
ffi = false
rawMemory = false
hardware = true
inlineAsm = false
interrupts = false
dependencyTrust = false # expected-error[E1002]: kernel profile requires trust.requireReport = true
