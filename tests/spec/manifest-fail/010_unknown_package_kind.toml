# stage: mvp
# milestone: M2
# purpose: package.kind is limited to the V01 artifact kinds

[package]
name = "badKind"
kind = "plugin" # expected-error[E1002]: package.kind must be application or library

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
