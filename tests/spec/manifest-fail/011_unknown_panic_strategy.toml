# stage: mvp
# milestone: M2
# purpose: panic.strategy accepts only the stage0 strategy names

[package]
name = "badPanicStrategy"
kind = "library"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "recover" # expected-error[E1002]: unknown panic strategy
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
