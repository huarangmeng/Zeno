# stage: mvp
# milestone: M2
# purpose: package.name is required for real Zeno.toml package manifests

[package]
kind = "library" # expected-error[E1003]: package.name is required

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
