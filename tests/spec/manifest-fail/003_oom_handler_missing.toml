# category: manifest-fail
# purpose: oom.strategy handler requires oom.handler

[package]
name = "missingOomHandler"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "kernel"

[allocator]
default = false

[panic]
strategy = "handler"
handler = "kernel.panicHandler"
stack = "addresses"

[oom]
strategy = "handler" # expected-error: oom.handler is required when strategy is handler
