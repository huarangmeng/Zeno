# category: package-fail
# stage: mvp
# milestone: M2
# purpose: local path dependencies must point at an existing package root

[package]
name = "missingPathDep"
kind = "library"

[dependencies]
platform = { path = "missing-platform" } # expected-error[E1004]: dependency path does not exist

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
