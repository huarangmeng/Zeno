# category: codegen-pass
# purpose: TaskGroup default collection uses completion order without hidden per-result allocation

[source]
file = "src/main.zn"
text = '''
async fn fetchPage(move job: Job) -> Result<Page, FetchError> {
    return fetch(move job);
}

async fn loadAll(move runtime: Runtime, move jobs: Vector<Job>) -> Result<Vector<Page>, FetchError> {
    var group = TaskGroup<Result<Page, FetchError>>.withCapacity(jobs.len(), mut runtime);

    for move job in jobs {
        try mut group.spawn(fetchPage(move job));
    }

    return try await move group.tryJoinAll();
}
'''

[expect.mir]
contains = [
    "TaskGroup<Result<Page, FetchError>> withCapacity",
    "completionOrder collect",
    "taskControlBlock explicit",
]
forbid = [
    "perResult heapAlloc",
    "joinAllOrdered resultSlots",
    "hidden globalRuntime",
]
