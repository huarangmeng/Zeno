# category: codegen-pass
# purpose: try lowers to ordinary branch plus RAII cleanup, not exceptions

[source]
file = "src/main.zn"
text = '''
struct Buffer {
    bytes: Vector<U8>,
}

impl Buffer {
    destroy {
    }
}

struct ParseAttemptMetric {}

impl ParseAttemptMetric {
    destroy {
        metrics.recordParseAttempt();
    }
}

fn parse(input: ArraySlice<U8>) -> Result<U32, ParseError> {
    val buffer = Buffer { bytes: Vector<U8>.withCapacity(16) };
    val attempt = ParseAttemptMetric {};

    val value = try parseHeader(input);
    return Ok(value);
}
'''

[expect.mir]
contains = [
    "switch discriminant(parseHeader.result)",
    "cleanup.drop attempt",
    "cleanup.drop buffer",
    "return Err",
]
forbid = [
    "exception",
    "heapAllocForTry",
]

[expect.llvm]
contains = [
    "branch",
]
forbid = [
    "invoke",
    "landingpad",
    "__cxa_throw",
]
