# category: codegen-pass
# purpose: non-escaping async future state does not allocate

[source]
file = "src/main.zn"
text = '''
async fn parse(move reader: Reader) -> Result<U32, IoError> {
    let header = try await mut reader.readU32();
    return Ok(header);
}

fn run(move reader: Reader, mut executor: InlineExecutor) -> Result<U32, IoError> {
    let future = parse(move reader);
    return executor.blockOn(move future);
}
'''

[expect.mir]
contains = [
    "FutureState parse local",
    "poll direct",
    "future mayEscape false",
]
forbid = [
    "Box<Future>",
    "heapAlloc future",
    "globalExecutor",
]

[expect.llvm]
forbid = [
    "malloc",
    "zeno_alloc",
]
