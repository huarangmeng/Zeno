# category: codegen-fail
# purpose: bridge C lowering must reject conversions that would allocate or copy owned strings

[source]
file = "src/main.zn"
text = '''
import core.result.{Result, Ok};
import core.ffi.CErrorCode;

enum Error {
    Failed,
}

impl CErrorCode for Error {
    fn toCCode(self) -> I32 {
        return 1;
    }
}

@export("make_name", bridge: C)
pub fn makeName() -> Result<String, Error> {
    return Ok(String.from("zeno"));
}
'''

[bad_codegen]
lowering = [
    "allocate CString in bridge thunk",
    "copy owned String into C out buffer",
    "expose Zeno String layout",
]

[expect]
# expected-error: bridge C cannot lower Result<String, Error> without hidden ownership cost
error = "bridge C cannot lower Result<String, Error> without hidden ownership cost"
