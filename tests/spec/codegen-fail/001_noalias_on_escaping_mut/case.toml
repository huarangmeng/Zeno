# category: codegen-fail
# purpose: mut access that escapes must not be lowered as noalias

[source]
file = "src/main.zn"
text = '''
fn save(mut data: ArraySlice<U8>) {
    Global.storeCallback((mut out: ArraySlice<U8>) {
        out[0] = data[0];
    });
}
'''

[bad_codegen]
llvmParamAttrs = [
    "data.ptr noalias",
]

[expect]
# expected-error: noalias requires proven unique non-escaping access
error = "noalias requires proven unique non-escaping access"
