# category: codegen-fail
# purpose: try early-return edge must run RAII cleanup

[source]
file = "src/main.zn"
text = '''
fn work() -> Result<Unit, Error> {
    val file = try File.open("out.bin");
    val auditGuard = AuditGuard.start();
    try writeHeader(mut file);
    return Ok(());
}
'''

[bad_mir]
contains = [
    "writeHeader.err -> return Err",
]
forbid = [
    "cleanup.drop auditGuard",
    "cleanup.drop file",
]

[expect]
error = "try early return edge must enter cleanup chain"
