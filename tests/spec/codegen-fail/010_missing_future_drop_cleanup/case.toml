# category: codegen-fail
# purpose: future drop cannot omit cleanup for initialized state

[source]
file = "src/main.zn"
text = '''
async fn task(move file: File) -> Result<Unit, IoError> {
    val auditGuard = AuditGuard.start();
    try await mut file.readU32();
    return Ok(());
}
'''

[bad_mir]
contains = [
    "futureDrop return",
]
forbid = [
    "cleanup.drop auditGuard",
    "cleanup.drop file",
]

[expect]
# expected-error: future drop must clean initialized state
error = "future drop must clean initialized state"
