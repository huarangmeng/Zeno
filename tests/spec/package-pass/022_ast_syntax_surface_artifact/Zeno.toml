# purpose: broader V01 syntax surface, including declaration bodies, expression forms, consts, statics, trust/FFI, and C ABI export markers, is represented in AST artifacts, projected into HIR/MIR/LLVM-preview facts, and the lowerable I32 const / static / trust extern / C export subset reaches a native object

[package]
name = "astSyntaxSurface"
version = "0.1.0"
kind = "library"

[dependencies]
core = "builtin"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = true
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
threadSafety = true
dependencyTrust = false
