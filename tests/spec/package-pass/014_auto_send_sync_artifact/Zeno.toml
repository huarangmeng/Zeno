# category: package-pass
# feature: build-artifact
# target: x86_64-unknown-linux-gnu
# profile: freestanding
# build-artifact: library
# zmeta-contains: sendSync = ["Job:Send:auto", "Job:Sync:auto"]
# zmeta-contains: linkRuntimeNeeds = []
# purpose: plain data structs record automatic Send/Sync facts without runtime linkage

[package]
name = "autoSendSync"
version = "0.1.0"
kind = "library"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"
