# category: package-pass
# feature: build-artifact
# target: x86_64-unknown-linux-gnu
# profile: freestanding
# build-artifact: library
# artifact-emit: llvm-ir
# zmeta-contains: declarationFingerprint = "fnv1a64:
# zmeta-contains: runtimeFingerprint = "fnv1a64:
# zmeta-contains: declarations=fnv1a64:
# zmeta-contains: runtime=fnv1a64:
# zmeta-contains: archiveFormat = "ar-native-object"
# zmeta-contains: llvm-ar
# zmeta-contains: archiveMember = "artifactLib.o"
# zmeta-contains: objectFormat = "native-object"
# zmeta-contains: finalArtifact = "lib/libartifactLib.a"
# zmeta-contains: fn answer stableNodeId=fnv1a64:
# zmeta-contains: module=root visibility=pub span=src/lib.zn:1:1
# emit-contains: ; module = 'artifactLib'
# emit-contains: target triple = "x86_64-unknown-linux-gnu"
# emit-contains: ; declarationFingerprint = "fnv1a64:
# emit-contains: ; buildFingerprint = "fnv1a64:
# object-contains: answer
# purpose: library package builds produce a static archive and zmeta

[package]
name = "artifactLib"
version = "0.1.0"
kind = "library"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
