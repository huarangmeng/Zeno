# purpose: minimal native Bool lowering supports inferred local consts, inferred call-result vals from unannotated val bindings, and binary Bool-call arguments before branching in a host executable

[package]
name = "nativeBoolApp"
version = "0.1.0"
kind = "application"

[target]
triple = "aarch64-apple-darwin"
profile = "hosted"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
