# category: package-pass
# stage: mvp
# milestone: M2
# feature: build-artifact
# target: aarch64-apple-darwin
# profile: hosted
# build-artifact: application
# artifact-emit: llvm-ir
# run-exit-code: 7
# zmeta-contains: executableFormat = "native-host-executable"
# zmeta-contains: objectFormat = "native-object"
# zmeta-contains: finalArtifact = "bin/nativeBoolApp"
# zmeta-contains: stmt.return isPositive module=main span=src/main.zn:4:1 expr=compare:> expected=Bool
# zmeta-contains: stmt.if pick module=main span=src/main.zn:8:1 condition=call:isPositive
# zmeta-contains: llvm.compare-preview @isPositive op=>
# zmeta-contains: llvm.call-preview @isPositive in @pick
# emit-contains: define i1 @isPositive(i32 %value)
# emit-contains: %t0 = icmp sgt i32 %value, 0
# emit-contains: ret i1 %t0
# emit-contains: define i32 @pick(i32 %value)
# emit-contains: %t0 = call i1 @isPositive(i32 %value)
# emit-contains: br i1 %t0, label %if.then.1, label %if.cont.1
# emit-contains: ret i32 7
# emit-contains: define i32 @main()
# emit-contains: %t0 = call i32 @pick(i32 3)
# purpose: minimal native Bool lowering emits i1 functions and uses Bool calls as real branch conditions before producing a host executable

[package]
name = "nativeBoolApp"
version = "0.1.0"
kind = "application"

[target]
triple = "aarch64-apple-darwin"
profile = "hosted"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
