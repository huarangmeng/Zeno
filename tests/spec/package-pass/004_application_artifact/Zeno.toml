# category: package-pass
# feature: build-artifact
# target: x86_64-unknown-linux-gnu
# profile: freestanding
# build-artifact: application
# artifact-emit: mir
# zmeta-contains: declarationFingerprint = "fnv1a64:
# zmeta-contains: runtimeFingerprint = "fnv1a64:
# zmeta-contains: declarations=fnv1a64:
# zmeta-contains: runtime=fnv1a64:
# zmeta-contains: executableFormat = "none"
# zmeta-contains: objectFormat = "native-object"
# zmeta-contains: finalArtifact = "obj/artifactApp.o"
# zmeta-contains: fn main stableNodeId=fnv1a64:
# zmeta-contains: module=main visibility=pub span=src/main.zn:3:1
# zmeta-contains: stmt.return main module=main span=src/main.zn:4:1 expr=int-literal:0 expected=I32
# zmeta-contains: hir.return main expr=int-literal:0 expected=I32 span=src/main.zn:4:1
# zmeta-contains: mir.return main value=int-literal:0 type=I32
# zmeta-contains: llvm.ret-preview @main type=I32 value=int-literal:0
# emit-contains: module artifactApp
# emit-contains: kind application
# emit-contains: declarationFingerprint fnv1a64:
# emit-contains: buildFingerprint fnv1a64:
# emit-contains: stage0.pipeline source->ast->hir->mir->llvm-ir->object->artifact
# emit-contains: stage0.pipeline ast->hir->mir->llvm
# emit-contains: mir.return main value=int-literal:0 type=I32
# purpose: application package builds produce an executable launcher and zmeta

[package]
name = "artifactApp"
version = "0.1.0"
kind = "application"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
