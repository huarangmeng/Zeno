# purpose: minimal native application build lowers inferred local consts, inferred call-result vals, mutable vars, binary expressions, direct calls, simple if-return control flow, and while loops to real LLVM IR, native object, and host executable

[package]
name = "nativeApp"
version = "0.1.0"
kind = "application"

[target]
triple = "aarch64-apple-darwin"
profile = "hosted"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
