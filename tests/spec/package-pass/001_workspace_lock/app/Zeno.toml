[package]
name = "app"
version = "0.1.0"

[dependencies]
corelib = { path = "../core" }

[target]
triple = "wasm32-unknown-unknown"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
