# category: package-pass
# purpose: git and registry dependencies are locked to exact sources

[package]
name = "app"
version = "0.1.0"

[dependencies]
hash = { git = "https://example.com/hash.git", rev = "4f9c2a7d8e9f00112233445566778899aabbccdd" }
log = { version = "1.2.3" }

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
