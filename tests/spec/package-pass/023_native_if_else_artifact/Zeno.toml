# category: package-pass
# stage: mvp
# milestone: M2
# feature: build-artifact
# target: aarch64-apple-darwin
# profile: hosted
# build-artifact: application
# artifact-emit: llvm-ir
# run-exit-code: 7
# zmeta-contains: executableFormat = "native-host-executable"
# zmeta-contains: objectFormat = "native-object"
# zmeta-contains: finalArtifact = "bin/nativeIfElseApp"
# zmeta-contains: nativeBodySources = ["choosePositive:ast-fields-if-else-return", "main:ast-fields"]
# zmeta-contains: stmt.if choosePositive module=main span=src/main.zn:4:1 condition=compare:>
# zmeta-contains: stmt.else choosePositive module=main span=src/main.zn:6:1
# zmeta-contains: stmt.return choosePositive module=main span=src/main.zn:5:1 expr=name:value expected=I32
# zmeta-contains: stmt.return choosePositive module=main span=src/main.zn:7:1 expr=int-literal:7 expected=I32
# zmeta-contains: mir.branch choosePositive kind=if condition=compare:> then=if.then else=if.cont
# zmeta-contains: llvm.branch @choosePositive kind=if condition=compare:>
# zmeta-contains: mir.rvalue main expr=call:choosePositive kind=call callee=@choosePositive
# zmeta-contains: llvm.call-preview @choosePositive in @main
# emit-contains: define i32 @choosePositive(i32 %value)
# emit-contains: %t0 = icmp sgt i32 %value, 0
# emit-contains: br i1 %t0, label %if.then.1, label %if.cont.1
# emit-contains: if.then.1:
# emit-contains: ret i32 %value
# emit-contains: if.cont.1:
# emit-contains: ret i32 7
# emit-contains: define i32 @main()
# emit-contains: %t0 = call i32 @choosePositive(i32 0)
# emit-contains: ret i32 %t0
# purpose: simple if/else return control flow lowers to real LLVM IR, native object, and host executable

[package]
name = "nativeIfElseApp"
version = "0.1.0"
kind = "application"

[target]
triple = "aarch64-apple-darwin"
profile = "hosted"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
