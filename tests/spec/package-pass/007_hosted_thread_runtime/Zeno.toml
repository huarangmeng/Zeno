# category: package-pass
# feature: build-artifact
# target: x86_64-unknown-linux-gnu
# profile: hosted
# build-artifact: application
# zmeta-contains: runtimeNeeds = ["thread"]
# zmeta-contains: linkRuntimeNeeds = ["thread"]
# zmeta-contains: hir.thread-spawn main api=Thread.spawn capture=move captures=1 runtime=thread span=src/main.zn:17:1
# zmeta-contains: hir.thread-capture main name=job type=Job mode=move requirement=Send result=accepted proof=auto-send span=src/main.zn:17:1
# zmeta-contains: mir.thread-spawn main api=Thread.spawn capture=move captures=1 runtime=thread
# zmeta-contains: mir.verifier-thread-spawn main result=accepted capture=move reason=move-closure span=src/main.zn:17:1
# zmeta-contains: mir.verifier-thread-send main place=%job type=Job result=accepted proof=auto-send span=src/main.zn:17:1
# zmeta-contains: llvm.thread-spawn-preview @main api=Thread.spawn capture=move runtime=thread
# zmeta-contains: llvm.thread-capture-preview @main place=%job type=Job send=accepted proof=auto-send
# zmeta-contains: runtime=fnv1a64:
# purpose: reachable hosted thread APIs are recorded as explicit runtime link needs

[package]
name = "hostedThread"
version = "0.1.0"
kind = "application"

[dependencies]
std = "builtin"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "hosted"

[allocator]
default = true
symbol = "std.alloc.system"

[panic]
strategy = "abort"
stack = "symbols"

[oom]
strategy = "abort"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
