# category: package-pass
# feature: build-artifact
# target: x86_64-unknown-linux-gnu
# profile: hosted
# build-artifact: library
# zmeta-contains: runtimeNeeds = ["c-abi-boundary"]
# zmeta-contains: linkRuntimeNeeds = ["c-abi-boundary"]
# zmeta-contains: exports = ["zeno_first_byte:bridge=C", "zeno_name_len:bridge=C", "zeno_read:bridge=C"]
# zmeta-contains: runtime=fnv1a64:
# purpose: exported C bridge thunks are recorded separately from direct C ABI exports

[package]
name = "cBridgeRuntime"
version = "0.1.0"
kind = "library"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "hosted"

[allocator]
default = true
symbol = "std.alloc.system"

[panic]
strategy = "abort"
stack = "symbols"

[oom]
strategy = "abort"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
