# purpose: top-level AST node facts enter artifact metadata, emitted MIR preview, and cache keys

[package]
name = "astArtifact"
version = "0.1.0"
kind = "library"

[dependencies]
core = "builtin"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = true
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
