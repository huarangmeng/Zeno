# category: package-pass
# feature: build-artifact
# target: x86_64-unknown-linux-gnu
# profile: hosted
# build-artifact: application
# zmeta-contains: profile = "hosted"
# zmeta-contains: runtimeNeeds = []
# zmeta-contains: linkRuntimeNeeds = []
# zmeta-contains: runtime=fnv1a64:
# purpose: hosted profile records capabilities without linking hidden runtime needs

[package]
name = "hostedQuiet"
version = "0.1.0"
kind = "application"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "hosted"

[allocator]
default = true

[panic]
strategy = "abort"
stack = "symbols"

[oom]
strategy = "abort"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
