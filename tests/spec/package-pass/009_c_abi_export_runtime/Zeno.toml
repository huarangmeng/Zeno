# category: package-pass
# feature: build-artifact
# target: x86_64-unknown-linux-gnu
# profile: hosted
# build-artifact: library
# artifact-emit: llvm-ir
# zmeta-contains: runtimeNeeds = ["c-abi-boundary"]
# zmeta-contains: linkRuntimeNeeds = ["c-abi-boundary"]
# zmeta-contains: exports = ["fd_value:abi=C", "point_sum:abi=C", "zeno_add:abi=C"]
# zmeta-contains: runtime=fnv1a64:
# emit-contains: define i32 @add(i32 %a, i32 %b)
# emit-contains: define i32 @zeno_add(i32 %a, i32 %b)
# emit-contains: %ret = call i32 @add(i32 %a, i32 %b)
# object-contains: zeno_add
# purpose: exported C ABI symbols are recorded and the lowerable I32 export is emitted as a native symbol

[package]
name = "cAbiRuntime"
version = "0.1.0"
kind = "library"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "hosted"

[allocator]
default = true
symbol = "std.alloc.system"

[panic]
strategy = "abort"
stack = "symbols"

[oom]
strategy = "abort"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
