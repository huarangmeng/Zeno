[package]
name = "mathlib"
version = "0.1.0"
kind = "library"

[dependencies]
mathbase = { path = "mathbase" }

[allocator]
default = false

[panic]
strategy = "abort"
stack = "none"

[oom]
strategy = "abort"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
threadSafety = false
dependencyTrust = false
