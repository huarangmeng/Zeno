# purpose: application linking consumes real local path dependency static archives through clang, including a transitive mathlib -> mathbase archive edge, leaving external dependency calls in root/library objects and validating the final host executable exit code

[package]
name = "nativePathDepLinkApp"
version = "0.1.0"
kind = "application"

[dependencies]
mathlib = { path = "mathlib" }

[target]
triple = "aarch64-apple-darwin"
profile = "hosted"

[allocator]
default = false

[panic]
strategy = "abort"
stack = "none"

[oom]
strategy = "abort"

[trust]
ffi = false
rawMemory = false
hardware = false
inlineAsm = false
interrupts = false
threadSafety = false
dependencyTrust = false
