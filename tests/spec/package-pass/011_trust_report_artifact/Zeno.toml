# category: package-pass
# feature: build-artifact
# target: x86_64-unknown-linux-gnu
# profile: freestanding
# build-artifact: library
# zmeta-contains: manifestTrust = ["dependencyTrust=false", "ffi=true", "hardware=false", "inlineAsm=false", "interrupts=false", "rawMemory=true"]
# zmeta-contains: trustCapabilities = ["ffi", "manifest:dependencyTrust=false", "manifest:ffi=true", "manifest:hardware=false", "manifest:inlineAsm=false", "manifest:interrupts=false", "manifest:rawMemory=true", "rawMemory", "trust-block"]
# zmeta-contains: trust.ffi=true
# zmeta-contains: trust.rawMemory=true
# purpose: trust extern, trust blocks, raw memory, and manifest trust policy are recorded in zmeta

[package]
name = "trustReport"
version = "0.1.0"
kind = "library"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = true
rawMemory = true
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
