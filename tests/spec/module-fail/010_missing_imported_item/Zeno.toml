# category: module-fail
# stage: mvp
# milestone: M2
# purpose: named imports must resolve to declarations in the imported module

[package]
name = "missingImportApp"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[dependencies]
platform = { path = "platform" }
