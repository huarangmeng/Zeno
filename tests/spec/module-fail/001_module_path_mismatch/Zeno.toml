# category: module-fail
# stage: mvp
# milestone: M2
# purpose: explicit module declarations must match src-relative file paths

[package]
name = "app"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
