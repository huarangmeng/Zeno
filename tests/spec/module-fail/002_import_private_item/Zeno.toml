# category: module-fail
# purpose: private declarations are visible only inside their defining file

[package]
name = "app"

[target]
triple = "wasm32-unknown-unknown"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
