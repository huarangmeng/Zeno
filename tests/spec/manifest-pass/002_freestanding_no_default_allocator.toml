# category: manifest-pass
# purpose: freestanding package can disable default allocator and lower failures to trap

[package]
name = "cryptoCore"
version = "0.1.0"

[target]
triple = "wasm32-unknown-unknown"
profile = "freestanding"

[allocator]
default = false

[panic]
strategy = "trap"
stack = "none"

[oom]
strategy = "trap"

[trust]
ffi = false
hardware = false
inlineAsm = false
interrupts = false
dependencyTrust = false
