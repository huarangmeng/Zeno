# category: manifest-pass
# purpose: kernel profile declares panic/OOM handlers and audited low-level trust capabilities

[package]
name = "kernel"
version = "0.1.0"

[target]
triple = "x86_64-unknown-linux-gnu"
profile = "kernel"

[allocator]
default = false

[panic]
strategy = "handler"
handler = "kernel.panicHandler"
stack = "addresses"

[oom]
strategy = "handler"
handler = "kernel.oomHandler"

[trust]
ffi = true
rawMemory = true
hardware = true
inlineAsm = true
interrupts = true
dependencyTrust = false
requireReport = true
allowedPackages = ["kernel", "platform"]
